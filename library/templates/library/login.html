<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f6f9;
        }

        .login-container {
            width: 400px;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #004494;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Student Login</h2>

        <form action="#" method="POST">

            <div class="input-group">
                <label for="email">Thapar Email ID</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="example@thapar.edu"
                    required>
            </div>

            <div class="input-group">
                <label for="rollno">Student Roll Number</label>
                <input
                    type="text"
                    id="rollno"
                    name="rollno"
                    placeholder="Enter Roll Number"
                    required>
            </div>

            <button type="submit" class="btn">Login</button>

        </form>
    </div>

</body>
</html>
