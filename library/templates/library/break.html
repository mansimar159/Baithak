{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baithak - Smart Library Seat Booking</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>

<body>

    <section>
        <div class="button-container">
        <div class="card">
            <h2>Permanent Checkout</h2><br>
            <button class="seat-select1" onclick="permanentCheckout()">Checkout</button>
        </div><br>
        <div class="card">
            <h2>Temporary Break</h2><br>
            <button class="seat-select1" onclick="temporaryCheckout()">Checkout</button>
        </div>
        </div>
    </section>

    <footer>
        <p>© 2026 Baithak | Smart Library Seat Booking System</p>
    </footer>

</body>

<script>
    function permanentCheckout(){

    let savedSeat =
        localStorage.getItem("reservedSeat");

    if(!savedSeat){

        alert("No active reservation.");
        return;
    }

    localStorage.removeItem("reservedSeat");
    localStorage.removeItem("reservationStart");

    alert("Checked Out Successfully!");

    window.location.href = "/index";
}

function temporaryCheckout(){

    let savedSeat =
        localStorage.getItem("reservedSeat");

    if(!savedSeat){

        alert("No active reservation.");
        return;
    }

    let data = JSON.parse(savedSeat);

    if(data.tempCheckoutUsed){

        alert(
            "Temporary checkout already used. Check in again before using it."
        );
        return;
    }

    data.status = "Reserved";

    data.tempCheckoutUsed = true;

    delete data.checkinTime;

    localStorage.setItem(
        "reservedSeat",
        JSON.stringify(data)
    );

    localStorage.setItem(
        "reservationStart",
        new Date().getTime()
    );

    alert(
        "Temporary Checkout Successful."
    );

    window.location.href = "/index";
}
</script>

</html>
