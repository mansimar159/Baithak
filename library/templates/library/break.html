{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baithak - Smart Library Seat Booking</title>
    <link rel="stylesheet" href="{% static 'break.css' %}"> 
</head>

<body>
    <nav>
        <h2><a href="{% url 'home' %}">Baithak</a></h2>

        <ul>
            <li><a href="{% url 'home' %}">Home</a></li>
            <li><a href="{% url 'home' %}#how-it-works">How It Works</a></li>
            <li><a href="{% url 'login' %}">Login</a></li>
        </ul>
    </nav>

    <br>
    <h1 style="text-align: center; font-family: 'Playfair Display', serif; margin-top: 5px;">Library Check Out</h1><br>
    
    <section>
        <div class="button-container">
       
            <br>
            <button class="seat-select1" onclick="permanentCheckout()">Permanent Checkout</button>
        <br>
        
            <button class="seat-select1" onclick="temporaryCheckout">Temporary Break</button>
            <!--<h2>Temporary Break</h2><br>
            <button class="seat-select1" onclick="temporaryCheckout()">Checkout</button>
        -->
        <br> 
          
            
            <button class="seat-select1" onclick="leaveLibrary()">Left without temporary checkout</button>
       
        </div>
    </section>

    <footer>
        <p>© 2026 Baithak | Smart Library <a href="{% url 'index' %}" style="color: white;">Seat</a> Booking System</p>
    </footer>

</body>

<script>
    function permanentCheckout(){

    let savedSeat =
        localStorage.getItem("reservedSeat");

    if(!savedSeat){

        alert("No active reservation.");
        return;
    }

    localStorage.removeItem("reservedSeat");
    localStorage.removeItem("reservationStart");

    alert("Checked Out Successfully!");

    window.location.href = "/index";
}

function temporaryCheckout(){

    let savedSeat =
        localStorage.getItem("reservedSeat");

    if(!savedSeat){

        alert("No active reservation.");
        return;
    }

    let data = JSON.parse(savedSeat);

    if(data.tempCheckoutUsed){

        alert(
            "Temporary checkout already used. Check in again before using it."
        );
        return;
    }

    data.status = "Reserved";

    data.tempCheckoutUsed = true;

    delete data.checkinTime;

    localStorage.setItem(
        "reservedSeat",
        JSON.stringify(data)
    );

    localStorage.setItem(
        "reservationStart",
        new Date().getTime()
    );

    alert(
        "Temporary Checkout Successful."
    );

    window.location.href = "/index";
}

function leaveLibrary() {
    localStorage.setItem(
        "libraryWarning",
        "true"
    );

    localStorage.setItem(
        "warningStart",
        new Date().getTime()
    );

    alert(
        "You left the library without Temporary or Permanent Checkout. You have 5 minutes to return and checkout."
    );

    window.location.href = "/notification";
}
</script>

</html>
